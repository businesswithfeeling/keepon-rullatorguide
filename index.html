<head>
  <meta charset="utf-8">

  <title>Rullatorguiden | Keepon v12</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --rk-green: #174f35;
      --rk-deep: #173d2b;
      --rk-text: #24322b;
      --rk-soft: #f7f8f3;
      --rk-line: #e2e8dc;
      --rk-cream: #fffdf8;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #fff;
      color: var(--rk-text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.55;
    }

    img {
      max-width: 100%;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    #rk-page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 14px 32px;
    }

    .rk-hero {
      position: relative;
      width: 100%;
      margin: 28px 0 36px;
      border-radius: 24px;
      overflow: hidden;
      background: #f7f4ee;
    }

    .rk-hero img {
      display: block;
      width: 100%;
      height: auto;
    }

    .rk-hero-actions {
      position: absolute;
      left: 3.8%;
      bottom: 21.5%;
      z-index: 5;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .rk-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 15px 24px;
      border-radius: 8px;
      border: 2px solid var(--rk-green);
      background: var(--rk-green);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    .rk-button--secondary {
      background: #fff;
      color: var(--rk-green);
    }

    .rk-guide {
      margin: 38px 0;
      padding: 34px 26px 38px;
      border: 1px solid #e5eadf;
      border-radius: 28px;
      background: linear-gradient(135deg, #f6f8f1, var(--rk-cream));
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.05);
    }

    .rk-guide h2 {
      margin: 0 0 8px;
      color: var(--rk-deep);
      font-size: 34px;
      line-height: 1.2;
      text-align: center;
    }

    .rk-guide-intro {
      margin: 0 0 18px;
      font-size: 17px;
      text-align: center;
    }

    .rk-progress {
      margin: 18px 0 22px;
      color: var(--rk-green);
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    .rk-step-card {
      position: relative;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 26px;
      background: #fff;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.08);
    }

    .rk-step-card img {
      display: block;
      width: 100%;
      height: auto;
    }

    .rk-choice {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .rk-choice:first-of-type {
      left: 0;
    }

    .rk-choice:last-of-type {
      right: 0;
    }

    .rk-choice:focus-visible {
      outline: 4px solid #f2c94c;
      outline-offset: -8px;
    }

    .rk-result {
      display: none;
      margin-top: 10px;
      padding: 30px;
      border-radius: 26px;
      background: #fff;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
    }

    .rk-result h3 {
      margin: 0 0 10px;
      color: var(--rk-deep);
      font-size: 30px;
      line-height: 1.25;
      text-align: center;
    }

    .rk-result-lead {
      max-width: 760px;
      margin: 0 auto 24px;
      font-size: 17px;
      text-align: center;
    }

    .rk-product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      margin-top: 24px;
    }

    .rk-product-card {
      padding: 22px;
      border: 1px solid #dfe8e2;
      border-radius: 22px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.04);
    }

    .rk-product-card img {
      width: 100%;
      height: 230px;
      margin-bottom: 16px;
      object-fit: contain;
      border-radius: 18px;
      background: #f6f6f6;
    }

    .rk-product-card h4 {
      margin: 0 0 8px;
      color: var(--rk-deep);
      font-size: 23px;
      line-height: 1.25;
    }

    .rk-product-card ul {
      padding-left: 20px;
    }

    .rk-advice {
      margin-top: 22px;
      padding: 18px;
      border-left: 5px solid var(--rk-green);
      border-radius: 14px;
      background: #eef6f0;
    }


    .rk-contact-reveal {
      display: none;
      max-width: 420px;
      margin: 16px auto 0;
      padding: 18px 20px;
      border: 1px solid #dfe8e2;
      border-radius: 16px;
      background: #eef6f0;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
    }

    .rk-contact-reveal strong {
      display: block;
      margin-bottom: 4px;
      color: var(--rk-deep);
      font-size: 20px;
      line-height: 1.25;
    }

    .rk-contact-reveal span {
      display: block;
      margin-bottom: 8px;
      color: var(--rk-text);
      font-size: 15px;
    }

    .rk-contact-reveal a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 18px;
      border-radius: 10px;
      border: 2px solid var(--rk-green);
      background: #fff;
      color: var(--rk-green);
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
    }

    .rk-result-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 22px;
    }

    .rk-trust {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      margin: 34px 0;
      padding: 22px;
      border: 1px solid var(--rk-line);
      border-radius: 22px;
      background: var(--rk-soft);
    }

    .rk-trust strong {
      display: block;
      margin-bottom: 5px;
      color: var(--rk-deep);
      font-size: 16px;
    }

    .rk-trust p {
      margin: 0;
      font-size: 14px;
    }

    .rk-help {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 24px;
      margin: 34px 0;
    }

    .rk-panel {
      padding: 28px;
      border: 1px solid #e5eadf;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.05);
    }

    .rk-panel h3 {
      margin: 0 0 18px;
      color: var(--rk-deep);
      font-size: 26px;
      line-height: 1.25;
    }

    .rk-faq-item {
      margin-bottom: 10px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--rk-soft);
    }

    .rk-contact {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      overflow: hidden;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .rk-contact img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
    }

      #rk-page {

      .rk-hero {

        font-size: 24px;

        object-position: center top;

      }

  <script>
    function rkSendHeightToParent() {
      var page = document.getElementById("rk-page");
      var guide = document.getElementById("rk-guide");

      var heights = [
        document.body ? document.body.scrollHeight : 0,
        document.documentElement ? document.documentElement.scrollHeight : 0,
        page ? page.scrollHeight : 0,
        page ? page.offsetHeight : 0,
        guide ? guide.scrollHeight : 0,
        guide ? guide.offsetHeight : 0
      ];

      var height = Math.max.apply(null, heights);

      if (window.innerWidth <= 700) {
        height += 56;
      } else {
        height += 32;
      }

      try {
        window.parent.postMessage({ type: "rk-guide-height", height: height }, "*");
        window.parent.postMessage("rk-guide-height:" + height, "*");
        window.parent.postMessage({ type: "rkGuideHeight", height: height }, "*");
      } catch (e) {}
    }

    function rkQueueHeightUpdate() {
      if (typeof rkSendHeightToParent === "function") {
        setTimeout(rkSendHeightToParent, 40);
        setTimeout(rkSendHeightToParent, 120);
        setTimeout(rkSendHeightToParent, 250);
        setTimeout(rkSendHeightToParent, 500);
        setTimeout(rkSendHeightToParent, 1000);
      }
    }

    function rkHideAllSteps() {
      for (var i = 1; i <= 6; i++) {
        var step = document.getElementById("rk-step" + i);
        if (step) step.hidden = true;
      }

      var result = document.getElementById("rk-result");
      if (result) result.style.display = "none";
    }

    function rkShowStep(stepNumber) {
      rkHideAllSteps();
      rkCurrentStep = stepNumber;

      var step = document.getElementById("rk-step" + stepNumber);
      if (step) step.hidden = false;

      var progress = document.getElementById("rk-progress");
      if (progress) progress.innerText = "Steg " + stepNumber + " av 6";

      var guide = document.getElementById("rk-guide");
      if (guide) guide.scrollIntoView({ behavior: "smooth", block: "start" });
      rkQueueHeightUpdate();
    }

    function rkSaveAnswer(key, value) {
      rkAnswers[key] = value;

      if (rkCurrentStep < 6) {
        rkShowStep(rkCurrentStep + 1);
      } else {
        rkShowResult();
      }
    }

    function rkScoreProduct(product) {
      var score = product.rankBias || 0;
      var tags = product.tags || [];
      function has(tag) { return tags.indexOf(tag) > -1; }

      if (rkAnswers.use === "inside") {
        if (has("inside")) score += 30;
        if (has("outside")) score -= 80;
      }

      if (rkAnswers.use === "outside") {
        if (has("outside")) score += 30;
        if (has("inside")) score -= 80;
      }

      if (rkAnswers.priority === "light") {
        if (has("light")) score += 14;
        if (has("car")) score += 4;
        if (has("stable")) score += 2;
      }

      if (rkAnswers.priority === "stable") {
        if (has("stable")) score += 14;
        if (has("functional")) score += 5;
        if (has("light")) score += 1;
      }

      if (rkAnswers.surface === "smooth") {
        if (has("smooth")) score += 8;
        if (has("rough")) score -= 2;
      }

      if (rkAnswers.surface === "rough") {
        if (has("rough")) score += 15;
        if (has("largewheels")) score += 12;
        if (has("smooth") && !has("rough")) score -= 3;
      }

      if (rkAnswers.car === "often") {
        if (has("car")) score += 10;
        if (has("light")) score += 7;
        if (has("largewheels")) score -= 2;
      }

      if (rkAnswers.car === "rarely") {
        if (has("stable")) score += 4;
        if (has("rough")) score += 2;
      }

      if (rkAnswers.seat === "yes") {
        if (has("seat")) score += 8;
      }

      if (rkAnswers.seat === "no") {
        if (has("light")) score += 3;
        if (has("tray")) score += 2;
      }

      if (rkAnswers.design === "modern") {
        if (has("design")) score += 13;
        if (has("premium")) score += 4;
        if (has("functional") && !has("design")) score -= 2;
      }

      if (rkAnswers.design === "functional") {
        if (has("functional")) score += 13;
        if (has("stable")) score += 5;
        if (has("safety")) score += 4;
      }

      // Specialistprodukter ska inte dominera en generell guide utan särskild medicinsk fråga.
      if (has("specialist")) score -= 28;

      return score;
    }

    function rkShowResult() {
      rkHideAllSteps();

      var result = document.getElementById("rk-result");
      if (result) result.style.display = "block";

      var progress = document.getElementById("rk-progress");
      if (progress) progress.innerText = "Din rekommendation";

      var rankedAll = rkProducts
        .map(function(product) {
          var copy = {};
          for (var key in product) copy[key] = product[key];
          copy.score = rkScoreProduct(product);
          return copy;
        })
        .sort(function(a, b) { return b.score - a.score; });

      // Välj flera olika produktfamiljer. De två första är huvudrekommendationer,
      // och därefter visas fler bra alternativ så att fler inlästa modeller faktiskt kan synas.
      var ranked = [];
      var usedFamilies = {};
      for (var i = 0; i < rankedAll.length; i++) {
        var product = rankedAll[i];
        var family = product.family || product.name;
        if (usedFamilies[family]) continue;
        usedFamilies[family] = true;
        ranked.push(product);
        if (ranked.length === 5) break;
      }

      var primary = ranked.slice(0, 2);
      var alternatives = ranked.slice(2, 5);

      document.getElementById("rk-result-content").innerHTML =
        '<h3>Vi tror att dessa två rullatorer passar dig bäst</h3>' +
        '<p class="rk-result-lead">Baserat på dina svar har vi valt ut två huvudrekommendationer. Under dem visar vi även fler modeller som kan passa, så att du inte bara ser samma få produkter varje gång.</p>' +
        '<div class="rk-product-grid">' +
        primary.map(rkProductCard).join("") +
        '</div>' +
        '<h3 class="rk-more-title">Fler bra alternativ</h3>' +
        '<p class="rk-result-lead rk-result-lead--small">De här modellerna matchar också dina svar, men är något mer specialiserade, tyngre, enklare eller mer premium beroende på dina val.</p>' +
        '<div class="rk-product-grid rk-product-grid--more">' +
        alternatives.map(rkProductCard).join("") +
        '</div>' +
        '<div class="rk-advice"><strong>Vill du vara helt säker?</strong><br>Kom gärna in till Keepon och prova rullatorn. Vid Parkinson, gångträning, rullstolskombination eller mycket specifika behov rekommenderar vi personlig rådgivning.</div>' +
        '<div class="rk-result-actions">' +
        '<a class="rk-button" href="https://keepon.se/kategori/rullator-ganghjalpmedel" target="_top">Se alla rullatorer</a>' +
        '<button class="rk-button rk-button--secondary" type="button" data-rk-help="true">Få personlig hjälp</button>' +
        '<button class="rk-button rk-button--secondary" type="button" data-rk-restart="true">Gör guiden igen</button>' +
        '</div>' +
        '<div id="rk-help-contact" class="rk-contact-reveal" hidden>' +
          '<strong>Kundservice</strong>' +
          '<span>Kontakta oss</span>' +
          '<a href="tel:0102630045">Telefon: 010-263 00 45</a>' +
        '</div>';

      var guide = document.getElementById("rk-guide");
      if (guide) guide.scrollIntoView({ behavior: "smooth", block: "start" });
      rkQueueHeightUpdate();
    }

    function rkProductCard(product) {
      return (
        '<article class="rk-product-card">' +
          '<img src="' + product.image + '" alt="' + product.name + '">' +
          '<h4>' + product.name + '</h4>' +
          '<p><strong>' + product.price + '</strong></p>' +
          '<ul>' +
            '<li>' + product.benefits[0] + '</li>' +
            '<li>' + product.benefits[1] + '</li>' +
            '<li>' + product.benefits[2] + '</li>' +
          '</ul>' +
          '<a class="rk-button" href="' + product.link + '" target="_top">Se produkt</a>' +
        '</article>'
      );
    }


    function rkShowHelpContact() {
      var contact = document.getElementById("rk-help-contact");
      if (!contact) return;

      contact.hidden = false;
      contact.style.display = "block";
      contact.scrollIntoView({ behavior: "smooth", block: "nearest" });
      rkQueueHeightUpdate();
    }

    function rkRestartGuide() {
      rkAnswers = {};
      rkShowStep(1);
    }

    document.addEventListener("click", function(event) {
      var choice = event.target.closest(".rk-choice");
      if (choice) {
        rkSaveAnswer(choice.getAttribute("data-key"), choice.getAttribute("data-value"));
        return;
      }

      if (event.target.closest("[data-rk-help]")) {
        rkShowHelpContact();
        return;
      }

      if (event.target.closest("[data-rk-restart]")) {
        rkRestartGuide();
      }
    });
  

    window.addEventListener("load", function() {
      rkQueueHeightUpdate();
    });

    window.addEventListener("resize", function() {
      rkQueueHeightUpdate();
    });

    window.addEventListener("orientationchange", function() {
      rkQueueHeightUpdate();
    });

    document.addEventListener("DOMContentLoaded", function() {
      rkQueueHeightUpdate();

      var images = document.querySelectorAll("img");
      images.forEach(function(img) {
        if (!img.complete) {
          img.addEventListener("load", rkQueueHeightUpdate);
          img.addEventListener("error", rkQueueHeightUpdate);
        }
      });
    });

    if ("ResizeObserver" in window) {
      var rkResizeObserver = new ResizeObserver(function() {
        rkQueueHeightUpdate();
      });
      rkResizeObserver.observe(document.body);
    }

    if ("MutationObserver" in window) {
      var rkMutationObserver = new MutationObserver(function() {
        rkQueueHeightUpdate();
      });
      rkMutationObserver.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        characterData: true
      });
    }

    setInterval(function() {
      rkQueueHeightUpdate();
    }, 1500);

    rkQueueHeightUpdate();
  </script>
